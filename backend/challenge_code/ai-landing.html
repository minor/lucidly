<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chat</title>
  <meta name="description" content="Get answers, find inspiration, be more productive. Free to use. Easy to try. Just ask and ChatGPT can help with writing, learning, brainstorming and more." />
  <style>
    /* ── Reset & Base ──────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff;
      --fg: #0a0a0a;
      --muted: #737373;
      --border: #e5e5e5;
      --card: #ffffff;
      --accent-bg: #f5f5f5;
      --accent-fg: #171717;
      --radius: 9999px;
    }
    html { -webkit-text-size-adjust: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.5;
      min-height: 100vh;
    }
    a { color: inherit; text-decoration: none; }
    button { cursor: pointer; border: none; background: none; font: inherit; color: inherit; }
    input { border: none; outline: none; font: inherit; background: transparent; }
    ul { list-style: none; }

    /* ── Scrollbar Hide ────────────────────────────────── */
    .scrollbar-none::-webkit-scrollbar { display: none; }
    .scrollbar-none { -ms-overflow-style: none; scrollbar-width: none; }

    /* ── Navbar ─────────────────────────────────────────── */
    .navbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 50;
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .navbar-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px;
    }
    .nav-logo {
      display: flex; align-items: center; gap: 8px;
    }
    .nav-logo svg { width: 24px; height: 24px; }
    .nav-logo span { font-size: 18px; font-weight: 600; letter-spacing: -0.02em; }
    .nav-links {
      display: flex; align-items: center; gap: 32px;
    }
    .nav-links a {
      font-size: 14px; color: var(--muted);
      transition: color .15s;
    }
    .nav-links a:hover { color: var(--fg); }
    .nav-actions {
      display: flex; align-items: center; gap: 12px;
    }
    .nav-actions .login {
      font-size: 14px; color: var(--muted);
      transition: color .15s;
    }
    .nav-actions .login:hover { color: var(--fg); }
    .nav-actions .cta {
      display: inline-flex; align-items: center;
      background: var(--fg); color: var(--bg);
      font-size: 14px; font-weight: 500;
      padding: 8px 16px; border-radius: var(--radius);
      transition: opacity .15s;
    }
    .nav-actions .cta:hover { opacity: .9; }
    .mobile-toggle {
      display: none;
      padding: 4px;
    }
    .mobile-toggle svg { width: 24px; height: 24px; }
    .mobile-menu {
      display: none;
      border-top: 1px solid var(--border);
      background: var(--bg);
      padding: 16px 24px;
      flex-direction: column; gap: 16px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-size: 14px; color: var(--muted);
      transition: color .15s;
    }
    .mobile-menu a:hover { color: var(--fg); }
    .mobile-menu .mobile-cta {
      display: inline-flex; width: fit-content;
      background: var(--fg); color: var(--bg);
      font-size: 14px; font-weight: 500;
      padding: 8px 16px; border-radius: var(--radius);
    }
    .mobile-divider { border-top: 1px solid var(--border); padding-top: 16px; display: flex; flex-direction: column; gap: 12px; }

    @media (max-width: 768px) {
      .nav-links, .nav-actions { display: none; }
      .mobile-toggle { display: block; }
    }

    /* ── Hero ───────────────────────────────────────────── */
    .hero {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 0 16px;
    }
    .hero-inner {
      display: flex; flex-direction: column; align-items: center; gap: 32px;
      width: 100%;
    }
    .hero h1 {
      text-align: center; font-weight: 600;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: -0.02em;
      text-wrap: balance;
    }

    /* ── Prompt Input ──────────────────────────────────── */
    .prompt-wrap {
      width: 100%; max-width: 672px;
    }
    .prompt-bar {
      display: flex; align-items: center; gap: 8px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); padding: 12px 16px;
      box-shadow: 0 1px 2px rgba(0,0,0,.04);
      transition: box-shadow .15s;
    }
    .prompt-bar:focus-within {
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
    }
    .prompt-bar .attach-btn {
      flex-shrink: 0; padding: 6px; border-radius: 50%;
      color: var(--muted); transition: background .15s, color .15s;
    }
    .prompt-bar .attach-btn:hover { background: var(--accent-bg); color: var(--fg); }
    .prompt-bar .attach-btn svg { width: 20px; height: 20px; }
    .prompt-bar input {
      flex: 1; color: var(--fg); font-size: 16px;
    }
    .prompt-bar input::placeholder { color: var(--muted); }
    .prompt-bar .send-btn {
      flex-shrink: 0; padding: 8px; border-radius: 50%;
      background: var(--accent-bg); color: var(--muted);
      transition: background .15s, color .15s;
    }
    .prompt-bar .send-btn.active {
      background: var(--fg); color: var(--bg);
    }
    .prompt-bar .send-btn svg { width: 16px; height: 16px; }

    /* ── Suggestion Pills ──────────────────────────────── */
    .pills-wrap {
      position: relative; width: 100%; max-width: 768px;
    }
    .pills-scroll {
      display: flex; gap: 8px;
      overflow-x: auto;
      padding: 4px;
    }
    .pill {
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); padding: 10px 16px;
      font-size: 14px; color: var(--muted);
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .pill:hover { background: var(--accent-bg); color: var(--fg); }
    .pill svg { width: 16px; height: 16px; flex-shrink: 0; }
    .fade-left, .fade-right {
      position: absolute; top: 0; z-index: 10; height: 100%; width: 64px;
      pointer-events: none;
    }
    .fade-left {
      left: 0;
      background: linear-gradient(to right, var(--bg), transparent);
      opacity: 0; transition: opacity .2s;
    }
    .fade-right {
      right: 0;
      background: linear-gradient(to left, var(--bg), transparent);
      opacity: 1; transition: opacity .2s;
    }
    .fade-left.visible { opacity: 1; }
    .fade-right.hidden { opacity: 0; }

    /* ── Bottom Bar ─────────────────────────────────────── */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
      background: rgba(255,255,255,.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .bottom-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: center;
      gap: 8px; padding: 12px 16px; flex-wrap: wrap;
    }
    .bottom-chip {
      display: flex; align-items: center; gap: 6px;
      border: 1px solid var(--border); border-radius: var(--radius);
      background: var(--card); padding: 8px 16px;
      font-size: 14px; color: var(--muted);
      transition: background .15s, color .15s;
      white-space: nowrap;
    }
    .bottom-chip:hover { background: var(--accent-bg); color: var(--fg); }
    .bottom-chip svg { width: 16px; height: 16px; flex-shrink: 0; }
    .bottom-chip .chip-label { display: inline; }

    @media (max-width: 640px) {
      .bottom-inner { gap: 6px; }
      .bottom-chip { padding: 8px 12px; font-size: 12px; }
      .bottom-chip .chip-label { display: none; }
      .bottom-chip svg { width: 14px; height: 14px; }
    }
  </style>
</head>
<body>

  <!-- ════════ NAVBAR ════════ -->
  <header class="navbar">
    <nav class="navbar-inner">
      <a href="#" class="nav-logo" aria-label="AI Chat Home">
        <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 1.89.525 3.66 1.438 5.168L2.047 21.34a.75.75 0 0 0 .94.94l4.172-1.391A9.953 9.953 0 0 0 12 22c5.523 0 10-4.477 10-10S17.523 2 12 2zm-3.5 9.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3zm3.5 0a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z"/>
        </svg>
        <span>AI Chat</span>
      </a>
      <button class="mobile-toggle" aria-label="Open menu" onclick="toggleMenu()">
        <svg id="menu-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="4" x2="20" y1="12" y2="12"/>
          <line x1="4" x2="20" y1="6" y2="6"/>
          <line x1="4" x2="20" y1="18" y2="18"/>
        </svg>
        <svg id="close-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none">
          <path d="M18 6 6 18"/>
          <path d="m6 6 12 12"/>
        </svg>
      </button>
    </nav>
  </header>

  <!-- ════════ HERO ════════ -->
  <main class="hero">
    <div class="hero-inner">
      <h1>What can I help with?</h1>

      <!-- Prompt bar -->
      <div class="prompt-wrap">
        <div class="prompt-bar">
          <button class="attach-btn" aria-label="Attach file">
            <!-- Paperclip -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
          </button>
          <input id="prompt-input" type="text" placeholder="Ask anything" autocomplete="off" />
          <button id="send-btn" class="send-btn" aria-label="Send message" disabled>
            <!-- Arrow Up -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m5 12 7-7 7 7"/><path d="M12 19V5"/></svg>
          </button>
        </div>
      </div>

      <!-- Suggestion pills -->
      <div class="pills-wrap">
        <div class="fade-left" id="fade-left"></div>
        <div class="pills-scroll scrollbar-none" id="pills-scroll">

          <button class="pill">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.42 10.922a1 1 0 0 0-.019-1.838L12.83 5.18a2 2 0 0 0-1.66 0L2.6 9.08a1 1 0 0 0 0 1.832l8.57 3.908a2 2 0 0 0 1.66 0z"/><path d="M22 10v6"/><path d="M6 12.5V16a6 3 0 0 0 12 0v-3.5"/></svg>
            <span>Quiz me on vocabulary</span>
          </button>

          <button class="pill">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
            <span>Plan a surf trip to Costa Rica</span>
          </button>
        </div>
        <div class="fade-right" id="fade-right"></div>
      </div>

    </div>
  </main>

</body>
</html>
